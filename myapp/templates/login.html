<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrendStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fcf8f8; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Home Navigation */
        .home-link {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .home-link:hover { color: #ff758c; transform: translateX(-5px); }

        .login-container {
            display: flex;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            max-width: 1000px;
            width: 90%;
            height: 580px;
        }

        /* ROSE-GOLD SIDE */
        .visual-side {
            flex: 1.2;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
        }

        .logo-huge {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
        }
        .logo-huge span { color: #1a1a1a; }

        /* FORM SIDE WITH FADE ANIMATION */
        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
            animation: fadeRight 0.8s ease-out forwards;
        }

        @keyframes fadeRight {
            0% { opacity: 0; transform: translateX(-30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        h2 { font-weight: 800; font-size: 30px; margin-bottom: 5px; color: #1a1a1a; }
        .subtitle { color: #aaa; margin-bottom: 35px; font-size: 14px; }

        label {
            font-size: 11px;
            font-weight: 800;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            display: block;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border: 2px solid #f8f8f8;
            border-radius: 15px;
            background: #fafafa;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { 
            border-color: #ffafbd; 
            background: #fff; 
            box-shadow: 0 10px 20px rgba(255, 175, 189, 0.1); 
        }

        .login-btn {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .login-btn:hover { background: #ff758c; transform: translateY(-2px); }

        /* FIXED NAVIGATION TO SIGNUP */
        .footer-nav {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #999;
        }
        .footer-nav a { 
            color: #ff758c; 
            text-decoration: none; 
            font-weight: 800; 
            margin-left: 5px;
        }
        .footer-nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <a href="{% url 'index' %}" class="home-link">
        <i class="fas fa-arrow-left"></i> RETURN TO SHOP
    </a>

    <div class="login-container">
        <div class="visual-side">
            <div class="logo-huge">TREND<span>STORE</span></div>
            <p style="font-weight: 600; letter-spacing: 3px; font-size: 0.7rem; text-transform: uppercase; opacity: 0.8;">Welcome Back</p>
        </div>

        <div class="form-side">
            <h2>Sign In</h2>
            <p class="subtitle">Enter your details to continue.</p>

            <form action="{% url 'login' %}" method="POST">
       {% csrf_token %}
       <label>Email Address</label>
         <input type="text" name="email" placeholder="Enter your email" required>

        <label>Password</label>
         <input type="password" name="password" placeholder="••••••••" required>

            <button type="submit" class="login-btn">Log In</button>
        </form>
            
            <p class="footer-nav">
                New here? <a href="{% url 'signup' %}">Create an account</a>
            </p>
        </div>
    </div>

</body>
</html>
