<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | TrendStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcf8f8; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1a1a1a;
        }

        .order-card { 
            background: white; 
            padding: 60px 45px; 
            border-radius: 40px; 
            width: 100%;
            max-width: 420px;
            text-align: center; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #fff1f3;
            color: #ff758c;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin: 0 auto 30px;
        }

        h1 { 
            font-weight: 800; 
            font-size: 28px; 
            letter-spacing: -1px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        /* FIXED: Darkened from #999 to #666 for better visibility */
        .details {
            color: #666; 
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .price-tag {
            background: #fdf2f4; /* Subtle rose tint for better contrast than plain grey */
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 40px;
            border: 1px solid #fae4e8;
        }

        .price-tag span {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #888; /* Darkened from #ccc */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .price-tag h2 {
            margin: 0;
            font-size: 36px;
            color: #1a1a1a;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .pay-btn { 
            background: #1a1a1a; 
            color: white; 
            width: 100%;
            padding: 20px; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pay-btn:hover { 
            background: linear-gradient(135deg, #ffafbd 0%, #ff758c 100%);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 117, 140, 0.3);
        }

        /* FIXED: "Back" Link is now a visible button-style link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            padding: 10px 20px;
            background: #f5f5f5;
            color: #444; /* High contrast dark grey */
            text-decoration: none;
            font-size: 11px;
            font-weight: 800;
            border-radius: 12px;
            letter-spacing: 1.5px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .back-link:hover {
            background: #eee;
            color: #1a1a1a;
            transform: translateX(-3px);
        }

        .secure-tag {
            margin-top: 25px;
            font-size: 10px;
            color: #aaa; /* Darkened for legibility */
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="order-card">
        <div class="icon-box">
            <i class="fas fa-lock"></i>
        </div>
        
        <h1>Secure Checkout</h1>
        <p class="details">
            You're one click away from <br>
            securing your <b>{{ cart_items|length }}</b> items.
        </p>
        
        <div class="price-tag">
            <span>Amount to Authorize</span>
            <h2>₹{{ total_price }}</h2>
        </div>

        <form action="{% url 'order_success' %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="pay-btn">Complete Purchase</button>
        </form>

        <a href="{% url 'cart' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Edit My Bag
        </a>
        
        <div class="secure-tag">
            <i class="fas fa-shield-alt"></i> SSL SECURED & ENCRYPTED
        </div>
    </div>
</body>
</html>
